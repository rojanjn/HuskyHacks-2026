openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: translate
    description: Slang translation operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /translate:
    post:
      operationId: translateText
      tags: [translate]
      summary: Translate text with cultural and slang context
      description: Translates text using Gemini AI, returning literal translation, contextual meaning, slang breakdown, tone, cultural notes, and natural equivalent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TranslateRequest"
      responses:
        "200":
          description: Translation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TranslateResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /translate/history:
    get:
      operationId: getTranslationHistory
      tags: [translate]
      summary: Get recent translation history
      description: Returns the last 10 translations stored in the database
      responses:
        "200":
          description: Translation history list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TranslationRecord"

  /translate/examples:
    get:
      operationId: getExamples
      tags: [translate]
      summary: Get example phrases to try
      description: Returns a set of interesting slang phrases from various languages to try
      responses:
        "200":
          description: Example phrases
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ExamplePhrase"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    TranslateRequest:
      type: object
      properties:
        text:
          type: string
          description: The text to translate
        sourceLanguage:
          type: string
          description: Source language (auto-detect if not specified)
          default: auto
        targetLanguage:
          type: string
          description: Target language
          default: English
        register:
          type: string
          enum: [formal, casual, slang, street, internet]
          description: Register/formality level
          default: casual
      required:
        - text

    SlangTerm:
      type: object
      properties:
        term:
          type: string
        explanation:
          type: string
      required:
        - term
        - explanation

    TranslateResponse:
      type: object
      properties:
        literal_translation:
          type: string
        contextual_meaning:
          type: string
        slang_breakdown:
          type: array
          items:
            $ref: "#/components/schemas/SlangTerm"
        tone:
          type: string
          enum: [formal, casual, humorous, sarcastic, aggressive, affectionate, neutral]
        cultural_notes:
          type: string
        equivalent_phrase:
          type: string
        detected_language:
          type: string
      required:
        - literal_translation
        - contextual_meaning
        - slang_breakdown
        - tone
        - cultural_notes
        - equivalent_phrase
        - detected_language

    TranslationRecord:
      type: object
      properties:
        id:
          type: integer
        text:
          type: string
        source_language:
          type: string
        target_language:
          type: string
        register:
          type: string
        result:
          $ref: "#/components/schemas/TranslateResponse"
        created_at:
          type: string
          format: date-time
      required:
        - id
        - text
        - source_language
        - target_language
        - register
        - result
        - created_at

    ExamplePhrase:
      type: object
      properties:
        text:
          type: string
        language:
          type: string
        description:
          type: string
      required:
        - text
        - language
        - description

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
