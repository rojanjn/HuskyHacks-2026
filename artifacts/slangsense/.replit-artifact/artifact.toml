kind = "web"
previewPath = "/"
title = "SlangSense"
version = "1.0.0"
id = "artifacts/slangsense"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23279

[services.development]
run = "pnpm --filter @workspace/slangsense run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/slangsense", "run", "build" ]
publicDir = "artifacts/slangsense/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23279"
BASE_PATH = "/"
